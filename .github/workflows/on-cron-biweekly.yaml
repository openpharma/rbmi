

on:
  schedule:
    - cron: '0 4 1,15 * *'
  workflow_dispatch:

name: cron Bi-Weekly

jobs:

  extended:
    runs-on: ubuntu-latest
    container:
      image: "ghcr.io/${{ github.repository_owner }}/rbmi:latest"
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Check
        run: tests/scripts/extended.sh

  cran:
    runs-on: ubuntu-latest
    container:
      image: "ghcr.io/${{ github.repository_owner }}/rbmi:latest"
    env:
      RUNNER_CRAN_OVERRIDE: "TRUE"
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Check
        run: ./tests/scripts/cran.sh
