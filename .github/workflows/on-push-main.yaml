

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'misc/**'

name: On Push

jobs:
  cran:
    runs-on: ubuntu-latest
    container:
      image: "ghcr.io/${{ github.repository_owner }}/rbmi:latest"
    env:
      RUNNER_CRAN_OVERRIDE: "TRUE"
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Check
        run: ./tests/scripts/cran.sh
