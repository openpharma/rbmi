name: Build latest version Docker images

env:
  REGISTRY: ghcr.io

on:
  schedule:
    - cron: '0 5 1 * *'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Docker image tag'
        required: true
        type: string
  push:
    tags-ignore:
       - '**'
    branches:
      - main
    paths:
      - 'misc/docker/**'
      - 'misc/docker/*'

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build & Deploy Docker Images

    # Token permissions
    permissions:
      contents: read
      packages: write

    # Build steps
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4
      
      - name: Determine image tag
        id: vars
        run: |
          BRANCH_NAME=${GITHUB_REF#refs/heads/}
          
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
             TAG="${{ github.event.inputs.tag }}"
          elif [ "$BRANCH_NAME" = "main" ]; then
             TAG="latest"
          else
             TAG="unknown"
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
      
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        id: buildx
        with:
          install: true
      
      - name: Build and push image 
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./misc/docker/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/rbmi:${{ steps.vars.outputs.tag }}
          build-args: |
            cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ github.repository_owner }}
            cache-to: type=inline
